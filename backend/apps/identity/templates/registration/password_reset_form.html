<!-- users/templates/registration/password_reset_form.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Password Reset</title>
</head>
<body>
    <h2>Reset Your Password</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.email.label_tag }}: {{ form.email }}
        <button type="submit">Send Reset Email</button>
    </form>
</body>
</html>
