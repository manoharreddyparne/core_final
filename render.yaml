services:
  # 1. API Node (Django Daphne / ASGI)
  - type: web
    name: auip-api
    env: docker
    rootDir: backend
    dockerContext: .
    dockerfile: Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/users/auth/config/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: auip_core.settings.production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DEBUG
        value: "False"
