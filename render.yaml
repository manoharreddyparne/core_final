services:
  # 1. API Node (Django Daphne / ASGI)
  - type: web
    name: auip-api
    env: docker
    rootDir: backend
    dockerContext: .
    dockerfile: Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/users/auth/config/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: auip_core.settings.production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DEBUG
        value: "False"

  # 2. Celery Worker (Task Consumer)
  - type: worker
    name: auip-worker
    env: docker
    rootDir: backend
    dockerContext: .
    dockerfile: Dockerfile
    dockerCommand: celery -A auip_core worker --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: auip_core.settings.production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

  # 3. Celery Beat (Scheduler)
  - type: worker
    name: auip-beat
    env: docker
    rootDir: backend
    dockerContext: .
    dockerfile: Dockerfile
    dockerCommand: celery -A auip_core beat --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: auip_core.settings.production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
