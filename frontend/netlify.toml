[build]
  command = "npm run build"
  publish = "dist"
  base = "frontend/"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://auip-backend.onrender.com" # Update this after backend deployment
