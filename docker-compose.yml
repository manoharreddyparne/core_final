services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: auip-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: always
    networks:
      - auip-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Cluster (Scaled)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - backend_static:/app/static
      - backend_media:/app/media
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      - DB_HOST=${DB_HOST:-aws-1-ap-southeast-1.pooler.supabase.com}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-H", "User-Agent: AUIP-HealthChecker/1.0", "-f", "http://localhost:8000/api/users/auth/config/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: ${AUTOSCALE_MIN:-3}
    restart: always
    networks:
      - auip-network

  # Migration Job (Runs once to prevent deadlocks in scaled clusters)
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py migrate_schemas --schema=public --noinput
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=${DB_HOST:-aws-1-ap-southeast-1.pooler.supabase.com}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - auip-network

  # Load Balancer (Entry point)
  nginx:
    image: nginx:alpine
    container_name: auip-gateway
    volumes:
      - ./infrastructure/nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./infrastructure/nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - backend_static:/app/static
      - backend_media:/app/media
    environment:
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - SERVER_NAME=${SERVER_NAME:-localhost}
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    ports:
      - "${GATEWAY_PORT:-8000}:80"
    depends_on:
      - backend
    networks:
      - auip-network
    restart: always

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auip-celery-worker
    command: celery -A auip_core worker --loglevel=info --concurrency=4 -Q celery,certificates,emails
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      - DB_HOST=${DB_HOST:-aws-1-ap-southeast-1.pooler.supabase.com}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - auip-network

  # Celery Beat (Periodic Task Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auip-celery-beat
    command: celery -A auip_core beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:${REDIS_PORT:-6379}/0
      - DB_HOST=${DB_HOST:-aws-1-ap-southeast-1.pooler.supabase.com}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - auip-network

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: auip-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - nginx
    restart: always
    networks:
      - auip-network

volumes:
  backend_static:
  backend_media:

networks:
  auip-network:
    driver: bridge
