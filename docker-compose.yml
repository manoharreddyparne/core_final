services:
  # PostgreSQL Database
  #  postgres:
  #    image: postgres:15-alpine
  #    container_name: auip-postgres
  #    environment:
  #      POSTGRES_DB: auip_db
  #      POSTGRES_USER: auip_user
  #      POSTGRES_PASSWORD: auip_password_dev
  #    volumes:
  #      - postgres_data:/var/lib/postgresql/data
  #    ports:
  #      - "5432:5432"
  #    networks:
  #      - auip-network
  #    healthcheck:
  #      test: [ "CMD-SHELL", "pg_isready -U auip_user -d auip_db" ]
  #      interval: 10s
  #      timeout: 5s
  #      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: auip-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    restart: always
    networks:
      - auip-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Django)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auip-backend
    command: sh -c "python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/static
      - backend_media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=aws-1-ap-southeast-1.pooler.supabase.com
      - TURNSTILE_ENABLED=True
      - LLM_API_BASE=${LLM_API_BASE}
      - LLM_MODEL=${LLM_MODEL}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - auip-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # Ollama Local AI (Commented out to prevent laptop hanging)
  # Uncomment only if you have 16GB+ RAM and a GPU
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: auip-ollama
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   restart: always
  #   networks:
  #     - auip-network

  # Celery Worker (async tasks: cert generation, emails)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auip-celery-worker
    command: sh -c "celery -A auip_core worker --loglevel=info --concurrency=2 -Q default,certificates,emails"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=aws-1-ap-southeast-1.pooler.supabase.com
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - auip-network

  # Celery Beat (periodic scheduler: daily expiry checks)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auip-celery-beat
    command: sh -c "celery -A auip_core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=aws-1-ap-southeast-1.pooler.supabase.com
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    restart: always
    networks:
      - auip-network

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: auip-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always
    networks:
      - auip-network

volumes:
  postgres_data:
  backend_static:
  backend_media:
  ollama_data:


networks:
  auip-network:
    driver: bridge
